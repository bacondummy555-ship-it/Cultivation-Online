<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cultivation RPG V8
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>
⚔ Cultivation RPG V8 ⚔
</h1>

</header>

<div class="game-container">

    <!-- LEFT SIDEBAR -->

    <aside class="sidebar">

        <div class="panel">

            <h2>
                Character
            </h2>

            <p>
                Realm:
                <span id="realmName">
                    Mortal
                </span>
            </p>

            <p>
                Level:
                <span id="level">
                    1
                </span>
            </p>

            <p>
                Spirit Stones:
                <span id="stones">
                    0
                </span>
            </p>

            <p>
                Attack:
                <span id="attack">
                    10
                </span>
            </p>

            <p>
                Defense:
                <span id="defense">
                    5
                </span>
            </p>

        </div>

        <div class="panel">

            <h2>
                Cultivation
            </h2>

            <p>
                Qi:
                <span id="qi">
                    0
                </span>
            </p>

            <div class="bar">

                <div
                id="qiFill"
                class="qi-fill">
                </div>

            </div>

            <button
            onclick="cultivate()">

            Cultivate

            </button>

            <button
            onclick="breakthrough()">

            Breakthrough

            </button>

        </div>

        <div class="panel">

            <h2>
                Beast
            </h2>

            <p id="beastName">
                None
            </p>

            <button
            onclick="tameBeast()">

            Tame Beast

            </button>

        </div>

    </aside>

    <!-- MAIN CONTENT -->

    <main>

        <!-- HP PANEL -->

        <div class="panel">

            <h2>
                Combat Stats
            </h2>

            <p>

                HP:

                <span id="hpText">
                    100 / 100
                </span>

            </p>

            <div class="bar">

                <div
                id="hpFill"
                class="hp-fill">
                </div>

            </div>

        </div>

        <!-- EQUIPMENT -->

        <div class="panel">

            <h2>
                Equipment
            </h2>

            <div class="equipment-grid">

                <div class="slot">

                    Weapon

                    <span
                    id="weaponSlot">

                    None

                    </span>

                </div>

                <div class="slot">

                    Armor

                    <span
                    id="armorSlot">

                    None

                    </span>

                </div>

                <div class="slot">

                    Ring

                    <span
                    id="ringSlot">

                    None

                    </span>

                </div>

                <div class="slot">

                    Boots

                    <span
                    id="bootsSlot">

                    None

                    </span>

                </div>

            </div>

        </div>

        <!-- INVENTORY -->

        <div class="panel">

            <h2>
                Inventory
            </h2>

            <div
            id="inventoryGrid"
            class="inventory-grid">

            </div>

        </div>

        <!-- COMBAT -->

        <div class="panel">

            <h2>
                Combat
            </h2>

            <button
            onclick="fightMonster()">

            Fight Monster

            </button>

            <button
            onclick="fightBoss()">

            Fight Boss

            </button>

        </div>

        <!-- QUESTS -->

        <div class="panel">

            <h2>
                Quests
            </h2>

            <div
            id="questList">

            </div>

        </div>

        <!-- DUNGEONS -->

        <div class="panel">

            <h2>
                Dungeons
            </h2>

            <button
            onclick="enterDungeon()">

            Enter Dungeon

            </button>

        </div>

        <!-- LOG -->

        <div class="panel">

            <h2>
                Combat Log
            </h2>

            <div
            id="combatLog">

            Welcome Cultivator

            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
