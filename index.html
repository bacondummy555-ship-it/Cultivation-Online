<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultivation Online Starter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚔ Cultivation Online Starter ⚔</h1>
</header>

<div class="container">

    <div class="panel">
        <h2>Character</h2>

        <p>Realm: <span id="realmName"></span></p>
        <p>Level: <span id="level"></span></p>
        <p>Qi: <span id="qi"></span></p>
        <p>Spirit Stones: <span id="spiritStones"></span></p>

        <p>Attack: <span id="attack"></span></p>
        <p>Defense: <span id="defense"></span></p>
        <p>HP: <span id="hp"></span></p>

        <button onclick="cultivate()">
            Cultivate
        </button>

        <button onclick="breakthrough()">
            Breakthrough
        </button>
    </div>

    <div class="panel">
        <h2>Equipment & Companions</h2>

        <button onclick="findEquipment()">
            Find Equipment
        </button>

        <button onclick="tameBeast()">
            Tame Beast
        </button>
    </div>

    <div class="panel">
        <h2>Dungeons</h2>

        <button onclick="runDungeon()">
            Enter Dungeon
        </button>

        <p id="dungeonResult">
            Ready.
        </p>
    </div>

    <div class="panel">
        <h2>Alchemy</h2>

        <button onclick="craftQiPill()">
            Craft Qi Pill
        </button>

        <button onclick="useQiPill()">
            Use Qi Pill
        </button>
    </div>

    <div class="panel">
        <h2>Daily Quest</h2>

        <button onclick="claimQuest()">
            Claim Reward
        </button>
    </div>

    <div class="panel">
        <h2>Ascension</h2>

        <button onclick="ascend()">
            Ascend
        </button>
    </div>

    <div class="panel">
        <h2>Inventory</h2>

        <button onclick="showInventory()">
            View Inventory
        </button>
    </div>

    <div class="panel">
        <h2>Save System</h2>

        <button onclick="saveGame()">
            Save Game
        </button>

        <button onclick="loadGame()">
            Load Game
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
